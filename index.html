<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eleccions ICGSB – Generador de paperetes</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    :root { --color-primary: #0d6efd; }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 480px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #1a1a1a;
    }
    h1 { font-size: 1.35rem; margin-bottom: 0.5rem; }
    p { color: #555; font-size: 0.95rem; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-weight: 600; margin-bottom: 0.35rem; }
    input[type="file"] {
      width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 6px;
      background: #fff; font-size: 0.95rem;
    }
    button {
      width: 100%; padding: 0.75rem 1rem; font-size: 1rem; font-weight: 600;
      color: #fff; background: var(--color-primary); border: none; border-radius: 6px; cursor: pointer;
    }
    button:hover { filter: brightness(0.95); }
    button:disabled { background: #6c757d; cursor: not-allowed; }
    .error, .success { margin-top: 1rem; padding: 0.75rem; border-radius: 6px; font-size: 0.9rem; }
    .error { background: #f8d7da; color: #721c24; }
    .success { background: #d1e7dd; color: #0f5132; }
    .hidden { display: none; }
    .logo { display: block; max-width: 100%; height: auto; margin-bottom: 1rem; }
    .lock-icon { vertical-align: middle; margin-left: 0.15em; }
    .progress-wrap { margin-top: 1rem; }
    .progress-bar-outer {
      height: 24px; background: #e9ecef; border-radius: 6px; overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%; background: var(--color-primary); border-radius: 6px;
      width: 0%; transition: width 0.15s ease-out;
    }
    .progress-pct { font-size: 0.9rem; font-weight: 600; color: #333; margin-top: 0.35rem; }
    .page-footer { margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid #e0e0e0; text-align: center; }
    .page-footer .ambia-logo { display: block; margin: 0 auto 0.5rem; height: 40px; width: auto; }
    .page-footer .dev-by { font-size: 0.85rem; color: #666; margin-bottom: 0.25rem; }
    .page-footer .copyright { font-size: 0.75rem; color: #888; }
  </style>
</head>
<body>
  <img class="logo" src="https://www.graduados-sociales.com/images/assets/logo-es100.svg" alt="Graduats Socials" width="280">
  <h1>Eleccions ICGSB</h1>
  <p>Puja l'exportació Excel de vots. El PDF es genera al navegador en un entorn segur SSL <span class="lock-icon" aria-hidden="true">🔒</span> (sense cap còpia al servidor).</p>

  <form id="form" enctype="multipart/form-data">
    <div class="form-group">
      <label for="excel">Fitxer Excel (.xlsx)</label>
      <input type="file" id="excel" name="excel" accept=".xlsx" required>
    </div>
    <div class="form-group">
      <button type="submit" id="btn">Generar PDF</button>
    </div>
  </form>

  <div id="message" role="alert" class="hidden"></div>
  <div id="progressWrap" class="progress-wrap hidden">
    <div class="progress-bar-outer">
      <div id="progressBar" class="progress-bar-inner" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
    </div>
    <div id="progressPct" class="progress-pct">0%</div>
  </div>

  <footer class="page-footer">
    <img class="ambia-logo" src="https://www.ambia.es/ambia_logo_petit.jpg" alt="ambia">
    <p class="dev-by">Desenvolupat per ambia</p>
    <p class="copyright">© 2025 ambia. Tots els drets reservats.</p>
  </footer>

  <script>
(function() {
  'use strict';

  function norm(s) {
    return String(s || '').toUpperCase().replace(/\s/g, '').replace(/_/g, '');
  }

  function detectColumns(headers) {
    const normMap = {};
    headers.forEach((h, i) => { normMap[norm(h)] = i; });
    const find = (...candidates) => {
      for (const c of candidates) {
        const k = norm(c);
        if (normMap[k] !== undefined) return normMap[k];
      }
      return -1;
    };
    const idxIdAgenda = find('Id agenda', 'ID agenda', 'id agenda', 'IDAGENDA', 'id_agenda');
    const idxNomAgenda = find('Nombre agenda', 'nombre agenda', 'NOMBREAGENDA', 'nombre_agenda');
    const idxId = find('ID', 'Id', 'id');
    const idxVots = find('VOTO', 'VOTOS', 'Voto', 'votos');
    if (idxId < 0 || idxVots < 0) return null;
    if (idxIdAgenda < 0 || idxNomAgenda < 0) {
      return { idxIdAgenda: -1, idxNomAgenda: -1, idxId, idxVots, fallback: true };
    }
    return { idxIdAgenda, idxNomAgenda, idxId, idxVots, fallback: false };
  }

  function parseExcel(ab) {
    const wb = XLSX.read(ab, { type: 'array' });
    const sheetNames = wb.SheetNames;
    let cols = null;
    let rows = null;

    // Preferir el full que tingui id agenda + nombre agenda (p. ex. Hoja2); si només n’hi ha amb ID i VOTO, usar el primer
    var candidates = [];
    for (const name of sheetNames) {
      const sheet = wb.Sheets[name];
      const data = XLSX.utils.sheet_to_json(sheet, { header: 1 });
      if (!data.length) continue;
      const headers = data[0].map(h => (h != null ? String(h).trim() : ''));
      const c = detectColumns(headers);
      if (c) candidates.push({ name, cols: c, rows: data });
    }
    if (candidates.length) {
      var preferred = candidates.find(function (x) { return !x.cols.fallback; });
      var chosen = preferred || candidates[0];
      cols = chosen.cols;
      rows = chosen.rows;
    }

    if (!rows || !cols) return null;
    const LINE_OFFSET = 1; // r=1 és fila 2 Excel (fila 1 = capçalera)
    const groupMap = {};
    const agendaOrder = {};

    for (let r = 1; r < rows.length; r++) {
      const row = rows[r];
      const idAgenda = cols.fallback ? '\u2014' : (row[cols.idxIdAgenda] != null ? String(row[cols.idxIdAgenda]).trim() : '');
      const nomAgenda = cols.fallback ? '\u2014' : (row[cols.idxNomAgenda] != null ? String(row[cols.idxNomAgenda]).trim() : '');
      const idVotant = row[cols.idxId] != null ? String(row[cols.idxId]).trim() : '';
      const vot = row[cols.idxVots] != null ? String(row[cols.idxVots]).trim() : '';
      if (!idVotant) continue;

      const key = idAgenda + '|' + idVotant;
      if (!agendaOrder[idAgenda]) agendaOrder[idAgenda] = { next: 1, voters: {} };
      if (agendaOrder[idAgenda].voters[idVotant] == null) {
        agendaOrder[idAgenda].voters[idVotant] = agendaOrder[idAgenda].next++;
      }
      const ordinal = agendaOrder[idAgenda].voters[idVotant];
      const totalAgenda = Object.keys(agendaOrder[idAgenda].voters).length;

      if (!groupMap[key]) {
        groupMap[key] = {
          idAgenda,
          nomAgenda,
          idVotant,
          ordinal,
          total: totalAgenda,
          lines: [],
          votes: []
        };
      }
      groupMap[key].lines.push(r + LINE_OFFSET);
      if (vot) groupMap[key].votes.push(vot);
    }

    const result = [];
    for (const k of Object.keys(groupMap)) {
      const g = groupMap[k];
      g.total = agendaOrder[g.idAgenda] ? Object.keys(agendaOrder[g.idAgenda].voters).length : g.lines.length;
      g.votes = [...new Set(g.votes)].sort();
      result.push(g);
    }
    result.sort((a, b) => {
      if (a.idAgenda !== b.idAgenda) return String(a.idAgenda).localeCompare(String(b.idAgenda));
      return a.ordinal - b.ordinal;
    });
    return result;
  }

  async function sha256Hex(buffer) {
    const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
    return Array.from(new Uint8Array(hashBuffer)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  }

  async function generatePDF(ballots, fileName, arrayBuffer) {
    const { jsPDF } = window.jspdf;
    const fileHash = await sha256Hex(arrayBuffer);
    const genDate = new Date();
    const dateStr = genDate.toLocaleString('ca-ES', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });

    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const A4_W = 210;
    const A4_H = 297;
    const MARGIN = 15;
    const HEADER_H = 12;
    const FOOTER_H = 12;
    const COLS = 2;
    const ROWS = 3;
    const CARD_W = (A4_W - 2 * MARGIN) / COLS;
    const CARD_H = (A4_H - HEADER_H - FOOTER_H - 2 * MARGIN) / ROWS;
    const INNER = 3;
    const SLOT = COLS * ROWS;
    const MARGIN_TOP = HEADER_H + MARGIN;

    let posInPage = 0;
    let lastIdAgenda = null;

    for (const b of ballots) {
      if (lastIdAgenda !== null && b.idAgenda !== lastIdAgenda) {
        doc.addPage();
        posInPage = 0;
      }
      lastIdAgenda = b.idAgenda;

      if (posInPage >= SLOT) {
        doc.addPage();
        posInPage = 0;
      }

      const col = posInPage % COLS;
      const row = Math.floor(posInPage / COLS);
      const x0 = MARGIN + col * CARD_W;
      const y0 = MARGIN_TOP + row * CARD_H;
      const bx = x0 + INNER;
      const by = y0 + INNER;
      const bw = CARD_W - 2 * INNER;
      const bh = CARD_H - 2 * INNER;

      doc.setFillColor(245, 240, 224);
      doc.rect(bx, by, bw, bh, 'F');
      doc.setDrawColor(0, 0, 0);
      doc.setLineWidth(0.5);
      doc.rect(bx, by, bw, bh, 'S');

      // jsPDF: y creix cap avall. by = dalt de la targeta, by+bh = baix
      doc.setTextColor(0, 0, 0);
      var topY = by + 6;
      doc.setFontSize(10);
      doc.setFont(undefined, 'bold');
      doc.text('ELECCIONS ICGSB', bx + 4, topY);
      doc.setFontSize(9);
      doc.text('VOT ELECTR\u00d2NIC', bx + 4, topY + 5);

      var y = topY + 14;
      doc.setFont(undefined, 'normal');
      doc.setFontSize(8);
      var nomParts = String(b.nomAgenda).split('//');
      for (var i = 0; i < nomParts.length; i++) {
        var t = nomParts[i].trim();
        if (t) { doc.text(t, bx + 4, y); y += 4; }
      }
      y += 2;
      doc.text('Identificador votant: ' + b.idVotant, bx + 4, y);
      y += 6;

      doc.setFont(undefined, 'bold');
      doc.setFontSize(9);
      doc.text('Vot em\u00e8s:', bx + 4, y);
      y += 5;
      doc.setFont(undefined, 'normal');
      doc.setFontSize(8);
      if (!b.votes.length) {
        doc.text('\u2014 Sense vot registrat \u2014', bx + 8, y);
        y += 5;
      } else {
        for (var vi = 0; vi < b.votes.length; vi++) {
          if (y > by + bh - 18) break;
          doc.text('- ' + b.votes[vi], bx + 8, y);
          y += 3.5;
        }
      }

      doc.setFontSize(7);
      doc.setFont(undefined, 'italic');
      doc.text('ID AGENDA: ' + b.idAgenda + ' - Papeleta: ' + b.ordinal + '/' + b.total, bx + 4, by + bh - 7);
      doc.text('L\u00ednies Excel: ' + b.lines.join(','), bx + 4, by + bh - 3.5);

      posInPage++;
    }

    var totalPages = doc.getNumberOfPages();
    doc.setFontSize(7);
    doc.setFont(undefined, 'normal');
    for (var p = 1; p <= totalPages; p++) {
      doc.setPage(p);
      doc.setTextColor(80, 80, 80);
      doc.text(fileName || '—', MARGIN, 6);
      doc.text(fileHash, MARGIN, 10);
      doc.setTextColor(80, 80, 80);
      doc.text(dateStr, MARGIN, A4_H - 6);
      doc.text('eleccions-icgsb.ambia.es', A4_W / 2, A4_H - 6, { align: 'center' });
      doc.text(p + '/' + totalPages, A4_W - MARGIN, A4_H - 6, { align: 'right' });
    }

    return doc.output('blob');
  }

  const form = document.getElementById('form');
  const input = document.getElementById('excel');
  const btn = document.getElementById('btn');
  const message = document.getElementById('message');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');
  const progressPct = document.getElementById('progressPct');

  function showMessage(text, isError) {
    message.textContent = text;
    message.className = isError ? 'error' : 'success';
    message.classList.remove('hidden');
  }
  function hideMessage() { message.classList.add('hidden'); }

  function setProgress(pct) {
    var n = Math.min(100, Math.round(pct));
    progressBar.style.width = n + '%';
    progressBar.setAttribute('aria-valuenow', n);
    progressPct.textContent = n + '%';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const file = input.files[0];
    if (!file) return;
    hideMessage();
    btn.disabled = true;
    progressWrap.classList.remove('hidden');
    setProgress(0);

    var durationMs = 5000 + Math.random() * 5000;
    var start = performance.now();
    function frame() {
      var elapsed = performance.now() - start;
      var pct = Math.min(100, (elapsed / durationMs) * 100);
      setProgress(pct);
      if (pct < 100) requestAnimationFrame(frame);
      else {
        progressWrap.classList.add('hidden');
        btn.textContent = 'Generant...';
        (async function() {
          try {
            const ab = await file.arrayBuffer();
            const ballots = parseExcel(ab);
            if (!ballots || ballots.length === 0) {
              showMessage('No s\'han trobat dades valides a l\'Excel.', true);
              return;
            }
            const blob = await generatePDF(ballots, file.name, ab);
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'paperetes_icgsb.pdf';
            a.click();
            URL.revokeObjectURL(url);
            showMessage('PDF generat correctament (' + ballots.length + ' paperetes).', false);
          } catch (err) {
            showMessage('Error: ' + err.message, true);
          } finally {
            btn.disabled = false;
            btn.textContent = 'Generar PDF';
          }
        })();
      }
    }
    requestAnimationFrame(frame);
  });
})();
  </script>
</body>
</html>
