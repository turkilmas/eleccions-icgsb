<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eleccions ICGSB – Generador de paperetes</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 480px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #1a1a1a;
    }
    h1 {
      font-size: 1.35rem;
      margin-bottom: 0.5rem;
    }
    p {
      color: #555;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.35rem;
    }
    input[type="file"] {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      font-size: 0.95rem;
    }
    button {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #0d6efd;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #0b5ed7; }
    button:disabled {
      background: #6c757d;
      cursor: not-allowed;
    }
    .error {
      margin-top: 1rem;
      padding: 0.75rem;
      background: #f8d7da;
      color: #721c24;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .success {
      margin-top: 1rem;
      padding: 0.75rem;
      background: #d1e7dd;
      color: #0f5132;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>Eleccions ICGSB</h1>
  <p>Puja l’exportació Excel de vots i genera el PDF de paperetes.</p>

  <form id="form" enctype="multipart/form-data">
    <div class="form-group">
      <label for="excel">Fitxer Excel (.xlsx)</label>
      <input type="file" id="excel" name="excel" accept=".xlsx" required>
    </div>
    <div class="form-group">
      <button type="submit" id="btn">Generar PDF</button>
    </div>
  </form>

  <div id="message" role="alert" class="hidden"></div>

  <script>
    const form = document.getElementById('form');
    const input = document.getElementById('excel');
    const btn = document.getElementById('btn');
    const message = document.getElementById('message');

    function showMessage(text, isError) {
      message.textContent = text;
      message.className = isError ? 'error' : 'success';
      message.classList.remove('hidden');
    }
    function hideMessage() {
      message.classList.add('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const file = input.files[0];
      if (!file) return;
      hideMessage();
      btn.disabled = true;
      btn.textContent = 'Generant…';

      const fd = new FormData();
      fd.append('excel', file);

      try {
        const res = await fetch('/generar', { method: 'POST', body: fd });
        const blob = await res.blob();
        if (!res.ok) {
          const text = await blob.text();
          showMessage(text || 'Error al generar el PDF', true);
          return;
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'paperetes_icgsb.pdf';
        a.click();
        URL.revokeObjectURL(url);
        showMessage('PDF generat i descarregat correctament.', false);
      } catch (err) {
        showMessage('Error de connexió: ' + err.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generar PDF';
      }
    });
  </script>
</body>
</html>
